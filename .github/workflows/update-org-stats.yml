name: Update organization stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate stats
        run: node scripts/update-org-stats.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ORG_NAME: rAthenaFR

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/org-stats.svg assets/org-stats.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update organization stats"
            git push
          fi
